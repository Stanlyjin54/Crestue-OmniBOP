server:
  port: ${PORT:6789}

# MyBatis配置
mybatis:
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/*.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

app:
  # 文件路径 示例（ Windows配置D:/kuafu/uploadPath，Linux配置 /home/kuafu/uploadPath）
  profile: ${UPLOAD_PATH:../../uploadPath}

knife4j:
  enable: true

cache:
  #缓存可选择redis还是local
  type: ${CACHE_TYPE:local}

token:
  expireTime: 43200

#mysql
spring:
  profiles:
    active: ${DB_TYPE:sqlite}
  jackson:
    date-format: "yyyy-MM-dd"
    time-zone: GMT+8
  redis:
    host: 114.116.233.39
    password: lmxderedis
    database: 3
  servlet:
    multipart:
      max-request-size: 100MB
      max-file-size: 50MB
      enabled: true
  web:
    resources:
      static-locations: file:${FRONTEND_DIR:/Users/jiangfei/kuafu/tmp/frontend/test/} , classpath:/dist/

# 在控制台输出sql
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


login:
  sms:
    debug: ${SMS_DEBUG:true}
    code_timeout: ${CODE_TIMEOUT:5}
  enable: ${LOGIN_ENABLE:true}
  table: Login
  select:
    table: Login
    column: phone_number
  openid:
    table: Login
    column: wx_open_id
  relevance_column_name: relevance_table
python:
  env: ${PYTHON_ENV:D:\software\anaconda3\envs\charts;D:\software\anaconda3\envs\charts\Library\mingw-w64\bin;D:\software\anaconda3\envs\charts\Library\usr\bin;D:\software\anaconda3\envs\charts\Library\bin;D:\software\anaconda3\envs\charts\Scripts;D:\software\anaconda3\envs\charts\bin;D:\software\anaconda3\condabin;}

# 微信支付配置
wx:
  pay:
    pay-back-url: ${WX_PAY_BACK_URL:http://localhost:6789/pay/callback/wechat}
    mch-serial-no: ${WX_MCH_SERIAL_NO:xxxx}
    app-id: ${WX_APP_ID:xxxx}
    mp-app-id: ${WX_MP_APP_ID:xxxx}
    mch-id: ${WX_MCH_ID:xxxx}
    api-v3-key: ${WX_API_V3_KEY:xxxx}
    private-key: ${WX_PRIVATE_KEY:xxxx}
    is_test: ${WX_IS_TEST:1}
    is_test_amount: ${WX_TEST_AMOUNT:0.01}
    wechat_enable: ${WX_ENABLE:true}
    mock_enable: ${MOCK_ENABLE:true}
    order_pre_key: ${WX_ORDER_PRE_KEY:000000-}

# 支付宝支付配置
alipay:
  enable: ${ALIPAY_ENABLE:true}
  app-id: ${ALIPAY_APP_ID:xxxx}
  private-key: ${ALIPAY_PRIVATE_KEY:xxxx}
  public-key: ${ALIPAY_PUBLIC_KEY:xxxx}
  alipay-public-key: ${ALIPAY_ALIPAY_PUBLIC_KEY:xxxx}
  server-url: ${ALIPAY_SERVER_URL:https://openapi.alipay.com/gateway.do}
  format: ${ALIPAY_FORMAT:json}
  charset: ${ALIPAY_CHARSET:utf-8}
  sign-type: ${ALIPAY_SIGN_TYPE:RSA2}
  pay-back-url: ${ALIPAY_PAY_BACK_URL:http://localhost:6789/pay/callback/alipay}
  is-test: ${ALIPAY_IS_TEST:1}
  test-amount: ${ALIPAY_TEST_AMOUNT:0.01}

